output:
    - summary
    - failure
pre-commit:
    parallel: true
    jobs:
        - name: format
          glob: "**/*.{ts,tsx,json}"
          run: npm run --silent format:files -- {staged_files}
          stage_fixed: true

        - name: lint
          glob: "**/*.{ts,tsx}"
          run: npm run --silent lint:files -- {staged_files}
          stage_fixed: true

pre-push:
    parallel: true
    jobs:
        - name: typecheck
          glob: "**/*.{ts,tsx}"
          run: npm run --silent typeCheck -- --pretty false

        - name: test
          run: npm run --silent test
