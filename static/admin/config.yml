backend:
    name: git-gateway
    branch: main
    commit_messages:
        create: "Create {{collection}} “{{slug}}”"
        update: "Update {{collection}} “{{slug}}”"
        delete: "Delete {{collection}} “{{slug}}”"
        uploadMedia: "[skip ci] Upload “{{path}}”"
        deleteMedia: "[skip ci] Delete “{{path}}”"
    squash_merges: true

local_backend: true
media_folder: static/img
public_folder: /img

collections:
    - name: "ideas"
      label: "Ideas"
      label_singular: "Idea"
      folder: "src/pages/ideas"
      create: true
      slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
      identifier_field: "title"
      fields:
          - {
                label: "Template Key",
                name: "templateKey",
                widget: "hidden",
                default: "idea-post",
            }
          - {
                label: "Question/Title/Hypothesis",
                name: "title",
                widget: "string",
                hint: "A one sentence description of the idea, question, or hypothesis.",
            }
          - {
                label: "Type",
                name: "type",
                widget: "select",
                options:
                    [
                        "analysis of existing data",
                        "hypothesis that requires new experimentation",
                        "micropublication",
                    ],
            }
          - {
                label: "Publish Date",
                name: "date",
                widget: "datetime",
                default: "{{now}}",
            }

          - {
                label: "Author(s)",
                name: "authors",
                widget: "relation",
                collection: "allenite",
                search_fields: ["name", "title"],
                value_field: "name",
                multiple: true,
            }
          - {
                label: "Program",
                name: "program",
                widget: "select",
                options: ["EMT", "Endo", "Other"],
            }
          - {
                label: "Introduction",
                name: "introduction",
                widget: "markdown",
                required: false,
                hint: "Why is this idea interesting or important?",
            }
          - {
                label: "Preliminary findings",
                name: "preliminaryFindings",
                widget: "object",
                hint: "What have you found so far?",
                required: false,
                fields:
                    [
                        {
                            label: "Summary of findings",
                            name: "summary",
                            widget: "markdown",
                            required: false,
                        },
                        {
                            label: "Images or figures",
                            name: "figures",
                            widget: "list",
                            required: false,
                            hint: "Add any images or figures that illustrate your preliminary findings.",
                            types:
                                [
                                    {
                                        label: "Image link",
                                        name: "imageLink",
                                        widget: "object",
                                        fields: [
                                                {
                                                    label: "Figure URL",
                                                    name: "url",
                                                    widget: "url-image",
                                                    hint: "Enter a valid image URL to see a preview",
                                                },
                                                {
                                                    label: "Caption",
                                                    name: "caption",
                                                    widget: "string",
                                                    required: false,
                                                },
                                            ],
                                    },
                                    {
                                        label: "Image file",
                                        name: "imageFile",
                                        widget: "object",
                                        fields: [
                                                {
                                                    label: "Figure",
                                                    name: "file",
                                                    widget: "image",
                                                    choose_url: false,
                                                },
                                                {
                                                    label: "Caption",
                                                    name: "caption",
                                                    widget: "string",
                                                    required: false,
                                                },
                                            ],
                                    },
                                ],
                        },
                    ],
            }
          - {
                label: "Datasets",
                name: "datasets",
                widget: "relation",
                collection: "resources",
                search_fields: ["name"],
                value_field: "{{slug}}",
                display_fields: ["name"],
                multiple: true,
                required: false,
                hint: "Select datasets from the Resources collection, if missing, please add to the Resources collection and then finish editing this entry.",
                filters: [{ field: "resourceDetails.type", values: ["dataset"] }],
            }
          - {
                label: "Resources",
                name: "resources",
                widget: "relation",
                collection: "resources",
                search_fields: ["resourceDetails.name", "resourceDetails.type"],
                value_field: "{{slug}}",
                display_fields: ["resourceDetails.type", "resourceDetails.name"],
                multiple: true,
                required: false,
                hint: "Select other resources from the Resources collection, if missing, please add to the Resources collection and then finish editing this entry.",
            }
          - {

                label: "Related Ideas",
                name: "related_ideas",
                widget: "relation",
                collection: "ideas",
                search_fields: ["title"],
                value_field: "{{slug}}",
                display_fields: ["title"],
                multiple: true,
                required: false,
                hint: "Select any related ideas to associate with this one.",
            }
          - {
                label: "Suggested next steps",
                name: "nextSteps",
                widget: "markdown",
                required: false,
                hint: "What are the next steps to further investigate this idea?",
            }
          - {
                label: "Associated publication",
                name: "publication",
                widget: "string",
                required: false,
            }
          - {
                label: "Tags",
                name: "tags",
                widget: "list",
                allow_add: true,
                required: false,
                default: [],
            }
          - {
                label: "Preferred acknowledgment",
                name: "acknowledgment",
                widget: "select",
                options:
                    ["as co-authors", "acknowledgment in paper", "citation"],
                required: false,
            }
          - {
                label: "AICS concerns if any (won't be shared publicly)",
                name: "concerns",
                widget: "string",
                required: false,
            }

    - name: "allenite"
      label: "Allenites"
      label_singular: "Allenite"
      folder: "src/pages/allenite"
      create: true
      slug: "{{name}}"
      fields:
          - {
                label: "Template Key",
                name: "templateKey",
                widget: "hidden",
                default: "allenite",
            }
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Position", name: "position", widget: "string", required: false }
          - {
                label: "Contact method",
                name: "contact",
                widget: "string",
                hint: "email, forum link, etc.",
                required: false,
            }
          - {
                label: "Program",
                name: "program",
                widget: "relation",
                collection: "program",
                required: false,
                search_fields: ["name"],
                value_field: "name",
                multiple: true,
            }

    - name: "program"
      label: "Programs"
      label_singular: "Program"
      folder: "src/pages/programs"
      create: true
      slug: "{{name}}"
      fields:
          - {
                label: "Template Key",
                name: "templateKey",
                widget: "hidden",
                default: "program",
            }
          - { label: "Name", name: "name", widget: "string" }
          - {
                label: "Description",
                name: "description",
                widget: "markdown",
                required: false,
            }
          - { label: "Image", name: "image", widget: image, required: false }
          - { label: "Active", name: "active", widget: boolean, default: false }

    - name: "resources"
      label: "Resources"
      label_singular: "Resource"
      folder: "src/pages/resource"
      create: true
      slug: "{{name}}"
      identifier_field: "name"
      summary: "{{resourceDetails.type}}: {{name}}"
      sortable_fields: ["name", "resourceDetails.type"]
      view_groups: [
            {
                label: "Type",
                field: "resourceDetails.type",
            }
      ]
      fields:
          - {
                label: "Template Key",
                name: "templateKey",
                widget: "hidden",
                default: "resource",
            }
          - {
                label: "Name",
                name: "name",
                widget: "hidden",
                default: "",
            }
          - {
                label: "Resource Details",
                name: "resourceDetails",
                widget: "resource_union", # custom widget
            }
    - name: "pages"
      label: "Pages"
      files:
          - file: "src/pages/index.md"
            label: "Landing Page"
            name: "index"
            fields:
                - {
                      label: "Template Key",
                      name: "templateKey",
                      widget: "hidden",
                      default: "index-page",
                  }
                - { label: Title, name: title, widget: string }
                - { label: Image, name: image, widget: image }
                - { label: Heading, name: heading, widget: string }
                - { label: Subheading, name: subheading, widget: string }
                - {
                      label: Mainpitch,
                      name: mainpitch,
                      widget: object,
                      fields:
                          [
                              { label: Title, name: title, widget: string },
                              {
                                  label: Description,
                                  name: description,
                                  widget: text,
                              },
                          ],
                  }
                - { label: "Body", name: "body", widget: "markdown" }

          - file: "src/pages/about/index.md"
            label: "About"
            name: "about"
            fields:
                - {
                      label: "Template Key",
                      name: "templateKey",
                      widget: "hidden",
                      default: "about-page",
                  }
                - { label: "Title", name: "title", widget: "string" }
                - { label: "Body", name: "body", widget: "markdown" }
