type MarkdownRemarkFields {
    slug: String!
}

type MarkdownRemark implements Node {
    frontmatter: Frontmatter!
    fields: MarkdownRemarkFields!
}

# Shared frontmatter fields for idea posts (and other markdown).
type Frontmatter {
    date: Date @dateformat
    title: String!
    description: String
    draft: Boolean
    tags: [String!]
    materialsAndMethods: MaterialsAndMethods!
    primaryContact: Allenite
    authors: [Allenite!]!
}

type Allenite implements Node {
    # slug is set as a top-level field in onCreateNode (not under fields like MarkdownRemark)
    slug: String!
    name: String!
    contactId: String
    position: String
    contact: String
    program: [String!]
}