type MarkdownRemarkFields {
    slug: String!
}

type MarkdownRemark implements Node {
    frontmatter: Frontmatter!
    fields: MarkdownRemarkFields!
}

# Shared frontmatter fields for idea posts (and other markdown).
type Frontmatter {
    date: Date @dateformat
    title: String!
    shortDescription: String
    description: String
    draft: Boolean
    tags: [String!]
    authors: [String!]!
    nextSteps: String
    program: [String!]
    publication: String
    introduction: String
    resources: [Resource!]!
}

type ResourceLink {
    name: String!
    url: String!
    description: String
}

type Resource implements Node {
    slug: String!
    name: String
    type: String
    shortDescription: String
    description: String
    links: [ResourceLink!]
    readmeLink: String
    file: String
    status: String
    date: Date @dateformat
    tags: [String!]
    draft: Boolean
}