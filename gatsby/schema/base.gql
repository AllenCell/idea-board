type MarkdownRemarkFields {
    slug: String!
}

type MarkdownRemark implements Node {
    frontmatter: Frontmatter!
    fields: MarkdownRemarkFields!
}

# Shared frontmatter fields for idea posts (and other markdown).
type Frontmatter {
    date: Date @dateformat
    title: String!
    description: String
    draft: Boolean
    tags: [String!]
    materialsAndMethods: MaterialsAndMethods!
    authors: [String!]!
    nextSteps: String
    program: [String!]
    publication: String
    introduction: String
    resources: [Resource!]!
}

type Resource implements Node {
    slug: String!
    name: String
    type: String
    description: String
    link: String
    readmeLink: String
    status: String
    date: Date @dateformat
    tags: [String!]
    draft: Boolean
}